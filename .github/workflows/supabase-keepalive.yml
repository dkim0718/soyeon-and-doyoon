# Free-tier Supabase projects pause after ~7 days without database
# activity, which would silently break the RSVP forms. This pings a
# cheap RLS-guarded query every 3 days to keep the project awake.
# (The key below is the public "publishable" key — safe in the repo;
# Row Level Security is the gate. See supabase/README.md.)
name: Supabase keep-alive
on:
  schedule:
    - cron: '17 3 */3 * *' # every 3 days at 03:17 UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database via REST
        run: |
          curl -sf --max-time 30 \
            "https://tggzvaivpvkaqqvruwze.supabase.co/rest/v1/config_overrides?select=scope&limit=1" \
            -H "apikey: sb_publishable_zbWod8789xhWf6sLKbdB-A_zBdo4h2W" \
            -o /dev/null -w "pinged database: http %{http_code}\n"
